name: NodeJS 20.x

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Build Core
      run: |
        cd ./packages/survey-core
        npm install
        ln -sf "$(pwd)/node_modules" ../../node_modules
        npm run build:all

    - name: Build React UI
      run: |
        cd ./packages/survey-react-ui
        npm install
        npm run build

    - name: Build Angular UI
      run: |
        cd ./packages/survey-angular-ui
        npm install
        npm run build

    - name: Build Vue3 UI
      run: |
        cd ./packages/survey-vue3-ui
        npm install
        npm run build

    - name: Build JS UI
      run: |
        cd ./packages/survey-js-ui
        npm install
        npm run build
