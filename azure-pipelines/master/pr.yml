# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

variables:
  npm_config_cache: $(Pipeline.Workspace)/.npm
  CurrentBranch: $(Build.SourceBranchName)
  ProjectId: "d79f2855-7b94-4261-9daf-4cace0a06c03"

trigger: none

pr:
  branches:
    include:
      - master

pool:
  name: main-selfhosted

stages:
  - stage: Lint
    dependsOn: []
    jobs:
      - job:
        steps:
          - checkout: self
            persistCredentials: true
            clean: true

          - template: templates/utils/node.yml

          - template: templates/utils/npm.yml
            parameters:
              directory: $(Build.SourcesDirectory)

          - script: npm run lint

  - stage: Core
    dependsOn: []
    jobs:
      - template: templates/core.yml

  - stage: React
    dependsOn: []
    jobs:
      - template: templates/react.yml

  - stage: Angular
    dependsOn: []
    jobs:
      - template: templates/angular.yml

  - stage: Vue
    dependsOn: []
    jobs:
      - template: templates/vue.yml

  - stage: Preact
    displayName: "Preact (ShadowDOM BoxSizing)"
    dependsOn: []
    jobs:
      - template: templates/preact.yml
