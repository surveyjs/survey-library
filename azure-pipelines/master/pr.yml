# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

variables:
  ArtifactNameLibraryCore: "SurveyJSLibraryBuildCore"
  ArtifactNameLibraryReact: "SurveyJSLibraryBuildReact"
  ArtifactNameLibraryAngular: "SurveyJSLibraryBuildAngular"
  ArtifactNameLibraryVue: "SurveyJSLibraryBuildVue3"
  ArtifactNameLibraryJS: "SurveyJSLibraryBuildSurveyUI"
  ArtifactNameCreatorV2Core: "SurveyJSCreatorV2BuildCore"
  ArtifactNameCreatorV2Angular: "SurveyJSCreatorV2BuildAngular"
  ArtifactNameCreatorV2React: "SurveyJSCreatorV2BuildReact"
  ArtifactNameCreatorV2Vue: "SurveyJSCreatorV2BuildVue"
  ArtifactNameCreatorV2JS: "SurveyJSCreatorV2BuildJS"
  ArtifactNameAnalytics: "SurveyJSAnalyticsBuild"
  ArtifactNamePDF: "SurveyjsPDFbuild"


resources:
  repositories:
    - repository: Library
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-library
    - repository: Creator
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-creator
    - repository: Analytics
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-analytics
    - repository: PDF
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-pdf


trigger: none

pr:
  branches:
    include:
      - master

pool:
  name: main-selfhosted

stages:
  - stage: Lint
    dependsOn: []
    jobs:
      - job:
        steps:
          - checkout: self

          - template: templates/utils/npm.yml
            parameters:
              directories: 
                - $(Build.SourcesDirectory)

          - script: npm run lint

  - stage: Options
    dependsOn: []
    jobs:
      - job: PRTitle
        displayName: "Parse PR title"
        steps:
          - checkout: none
          - bash: |
              TARGET_BRANCH="$(System.PullRequest.TargetBranch)"
              TARGET_BRANCH="${TARGET_BRANCH#refs/heads/}"

              PR_TITLE=$(curl -sf "https://api.github.com/repos/$(Build.Repository.Name)/pulls/$(System.PullRequest.PullRequestNumber)" | jq -r '.title // empty') || {
                echo "##vso[task.logissue type=warning]Failed to fetch PR title"
                exit 0
              }
              echo "PR Title: $PR_TITLE"

              # Extract all [name: value] pairs from PR title and export as pipeline variables
              while IFS== read -r NAME VALUE; do
                NAME="${NAME^^}"
                if [[ "$NAME" =~ ^[A-Z_]+$ ]]; then
                  echo "Extracted: ${NAME}=${VALUE}"
                  echo "##vso[task.setvariable variable=${NAME};isOutput=true]${VALUE}"
                else
                  echo "Skipping invalid variable name: ${NAME}"
                fi
              done < <(echo "$PR_TITLE" | grep -oE '\[[^]]+:[^]]+\]' | sed -E 's/\[\s*([^:]+?)\s*:\s*(.*?)\s*\]/\1=\2/')
            name: data
 
 
  ###############
  # Build Phase #
  ###############
  - stage: LibraryCoreBuild
    displayName: "Library Core Build"
    dependsOn: []
    jobs:
      - job:
        steps:
          - template: core/build.yml
            parameters:
              store: true

  - stage: LibraryReactBuild
    displayName: "Library React Build"
    dependsOn: []
    jobs:
      - job:
        steps:
          - template: react/build.yml
            parameters:
                store: true

  - stage: LibraryAngularBuild
    displayName: "Library Angular Build"
    dependsOn: []
    jobs:
      - job:
        steps:
          - template: angular/build.yml
            parameters:
                store: true

  - stage: LibraryVueBuild
    displayName: "Library Vue Build"
    dependsOn: []
    jobs:
      - job:
        steps:
          - template: vue/build.yml
            parameters:
                store: true

  - stage: LibraryJSBuild
    displayName: "Library JS (Preact ShadowDOM BoxSizing) Build"
    dependsOn: []
    jobs:
      - job:
        steps:
          - template: js/build.yml
            parameters:
                store: true

  - stage: CreatorCoreBuild
    displayName: "Creator Core Build"
    dependsOn:
      - Options
      - LibraryCoreBuild
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    jobs:
    - job:
      displayName: "Build"
      steps:
        - template: core/build.yml
          parameters:
            checkout: Creator
            store: true

  - stage: CreatorReactBuild
    displayName: "Creator React Build"
    dependsOn:
      - Options
      - LibraryCoreBuild
      - LibraryReactBuild
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    jobs:
      - job:
        steps:
          - template: react/build.yml
            parameters:
              checkout: Creator
              store: true

  - stage: CreatorAngularBuild
    displayName: "Creator Angular Build"
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    dependsOn:
      - Options
      - LibraryCoreBuild
      - LibraryAngularBuild
    jobs:
      - job:
        steps:
          - template: angular/build.yml
            parameters:
              checkout: Creator
              store: true

  - stage: CreatorVueBuild
    displayName: "Creator Vue Build"
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    dependsOn:
      - Options
      - LibraryCoreBuild
      - LibraryVueBuild
    jobs:
      - job:
        steps:
          - template: vue/build.yml
            parameters:
              checkout: Creator
              store: true

  - stage: CreatorJSBuild
    displayName: "Creator JS (Preact ShadowDOM BoxSizing) Build"
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    dependsOn:
      - Options
      - LibraryCoreBuild
      - LibraryJSBuild
    jobs:
      - job:
        steps:
          - template: js/build.yml
            parameters:
              checkout: Creator
              store: true

