  ##############
  # Test Phase #
  ##############
  - stage: LibraryCoreTest
    displayName: "Library Core Test"
    dependsOn: []
    jobs:
      - template: templates/library/core/test.yml

  - stage: LibraryReactTest
    displayName: "Library React Test"
    dependsOn: []
    jobs:
      - template: templates/library/react/test.yml

  - stage: LibraryAngularTest
    displayName: "Library Angular Test"
    dependsOn: []
    jobs:
      - template: templates/library/angular/test.yml

  - stage: LibraryVueTest
    displayName: "Library Vue Test"
    dependsOn: []
    jobs:
      - template: templates/library/vue/test.yml

  - stage: LibraryJSTest
    displayName: "Library JS (Preact ShadowDOM BoxSizing) Test"
    dependsOn: []
    jobs:
      - template: templates/library/js/test.yml

  - stage: CreatorCoreTest
    displayName: "Creator Core Test"
    dependsOn:
      - Options
      - LibraryCoreBuild
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    jobs:
      - template: templates/creator/core/test.yml
        parameters:
          checkout: Creator

  - stage: CreatorReactTest
    displayName: "Creator React Test"
    dependsOn:
      - Options
      - LibraryCoreBuild
      - LibraryReactBuild
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    jobs:
      - template: templates/creator/react/test.yml
        parameters:
          checkout: Creator

  - stage: CreatorAngularTest
    displayName: "Creator Angular Test"
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    dependsOn:
