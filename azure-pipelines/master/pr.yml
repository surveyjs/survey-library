  ##############
  # Test Phase #
  ##############
  - stage: LibraryCoreTest
    displayName: "Library Core Test"
    dependsOn: []
    jobs:
      - template: core/test.yml

  - stage: LibraryReactTest
    displayName: "Library React Test"
    dependsOn: []
    jobs:
      - template: react/test.yml

  - stage: LibraryAngularTest
    displayName: "Library Angular Test"
    dependsOn: []
    jobs:
      - template: angular/test.yml

  - stage: LibraryVueTest
    displayName: "Library Vue Test"
    dependsOn: []
    jobs:
      - template: vue/test.yml

  - stage: LibraryJSTest
    displayName: "Library JS (Preact ShadowDOM BoxSizing) Test"
    dependsOn: []
    jobs:
      - template: js/test.yml

  - stage: CreatorCoreTest
    displayName: "Creator Core Test"
    dependsOn:
      - Options
      - LibraryCoreBuild
    variables:
      PR: $[ stageDependencies.Options.PRTitle.outputs['data.CREATOR'] ]
    jobs:
      - template: core/test.yml
        parameters:
          checkout: Creator

  - stage: CreatorReactTest
    displayName: "Creator React Test"
    dependsOn:
