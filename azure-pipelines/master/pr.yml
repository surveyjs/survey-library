# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

variables:
  - template: templates/utils/variables.yml

resources:
  repositories:
    - repository: Library
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-library
      ref: $(System.PullRequest.TargetBranch)
    - repository: Creator
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-creator
      ref: $(System.PullRequest.TargetBranch)
    - repository: Analytics
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-analytics
      ref: $(System.PullRequest.TargetBranch)
    - repository: PDF
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-pdf
      ref: $(System.PullRequest.TargetBranch)
    - repository: Service
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/service
    - repository: SiteData
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/surveyjs-site-data
    - repository: Utils
      type: github
      endpoint: github.com_surveyjsdeveloper
      name: surveyjs/survey-utils
  pipelines:
    - pipeline: ReleaseVersion
      source: Release Version
      trigger: none


trigger: none

pr:
  branches:
    include:
      - master

pool:
  name: main-selfhosted

stages:
  - stage: Lint
    dependsOn: []
    jobs:
      - job:
        steps:
          - checkout: self
          
          - template: templates/utils/npm.yml
            parameters:
              directories:
                - $(Build.SourcesDirectory)

          - script: npm run lint
            workingDirectory: $(Build.SourcesDirectory)


  - stage: Options
    dependsOn: []
    jobs:
      - job:
        steps:
          - checkout: none
          - script: |
              echo "===== Build Variables ====="
              echo "Build.BuildId: $(Build.BuildId)"
              echo "Build.BuildNumber: $(Build.BuildNumber)"
              echo "Build.DefinitionName: $(Build.DefinitionName)"
              echo "Build.Reason: $(Build.Reason)"
              echo "Build.SourceBranch: $(Build.SourceBranch)"
              echo "Build.SourceBranchName: $(Build.SourceBranchName)"
              echo "Build.SourceVersion: $(Build.SourceVersion)"
              echo "Build.SourcesDirectory: $(Build.SourcesDirectory)"
              echo "Build.Repository.Name: $(Build.Repository.Name)"
              echo "Build.Repository.Provider: $(Build.Repository.Provider)"
              echo "Build.RequestedFor: $(Build.RequestedFor)"
              echo "Build.RequestedForEmail: $(Build.RequestedForEmail)"
              echo "Build.QueuedBy: $(Build.QueuedBy)"
              echo ""
              echo "===== System Variables ====="
              echo "System.TeamProject: $(System.TeamProject)"
              echo "System.CollectionUri: $(System.CollectionUri)"
              echo "System.DefinitionId: $(System.DefinitionId)"
              echo "System.JobId: $(System.JobId)"
              echo "System.StageDisplayName: $(System.StageDisplayName)"
              echo "System.StageName: $(System.StageName)"
              echo "System.PullRequest.PullRequestId: $(System.PullRequest.PullRequestId)"
              echo "System.PullRequest.SourceBranch: $(System.PullRequest.SourceBranch)"
              echo "System.PullRequest.TargetBranch: $(System.PullRequest.TargetBranch)"
              echo "System.PullRequest.PullRequestNumber: $(System.PullRequest.PullRequestNumber)"
              echo ""
              echo "===== Agent Variables ====="
              echo "Agent.Name: $(Agent.Name)"
              echo "Agent.MachineName: $(Agent.MachineName)"
              echo "Agent.OS: $(Agent.OS)"
              echo "Agent.BuildDirectory: $(Agent.BuildDirectory)"
              echo "Agent.WorkFolder: $(Agent.WorkFolder)"
              echo "Agent.TempDirectory: $(Agent.TempDirectory)"
              echo ""
              echo "===== Pipeline Variables ====="
              echo "Pipeline.Workspace: $(Pipeline.Workspace)"
            displayName: "Print predefined variables"
      - job: PRTitle
        displayName: "Parse PR title"
        steps:
          - template: templates/utils/pr_title_parser.yml
      - job: Version
        displayName: "Get Release Version"
        steps:
          - template: templates/utils/version.yml
 
 
  ###############
  # Build Phase #
  ###############
  - stage: LibraryCoreBuild
    displayName: "Library Core Build"
    dependsOn: 
      - Options
    variables:
      VERSION: $[ stageDependencies.Options.Version.outputs['data.VERSION'] ]
    jobs:
      - job:
        steps:
          - template: templates/library/core/build.yml
            parameters:
              store: true

  - stage: LibraryReactBuild
    displayName: "Library React Build"
    dependsOn: 
      - Options
    variables:
      VERSION: $[ stageDependencies.Options.Version.outputs['data.VERSION'] ]
    jobs:
      - job:
        steps:
          - template: templates/library/react/build.yml
            parameters:
                store: true

  - stage: LibraryAngularBuild
    displayName: "Library Angular Build"
    dependsOn: 
      - Options
    variables:
      VERSION: $[ stageDependencies.Options.Version.outputs['data.VERSION'] ]
    jobs:
      - job:
        steps:
          - template: templates/library/angular/build.yml
            parameters:
                store: true

  - stage: LibraryVueBuild
    displayName: "Library Vue Build"
    dependsOn: 
      - Options
    variables:
      VERSION: $[ stageDependencies.Options.Version.outputs['data.VERSION'] ]
    jobs:
      - job:
        steps:
          - template: templates/library/vue/build.yml
            parameters:
                store: true

  - stage: LibraryJSBuild
    displayName: "Library JS (Preact ShadowDOM BoxSizing) Build"
    dependsOn: 
      - Options
    variables:
      VERSION: $[ stageDependencies.Options.Version.outputs['data.VERSION'] ]
    jobs:
      - job:
        steps:
          - template: templates/library/js/build.yml
            parameters:
                store: true

