<div [class]="model.cssClasses.rootSwitch" role="checkbox" [attr.aria-checked]="model.booleanValue || false"
  [attr.aria-required]="model.a11y_input_ariaRequired" [attr.aria-label]="model.a11y_input_ariaLabel"
  [attr.aria-labelledby]="model.a11y_input_ariaLabelledBy" [attr.aria-invalid]="model.a11y_input_ariaInvalid"
  [attr.aria-errormessage]="model.a11y_input_ariaErrormessage" (click)="model.booleanValue = !model.booleanValue">
  <div [class]="model.cssClasses.switchButton + (model.booleanValue ? ' ' + model.cssClasses.switchButtonChecked : '')"
    tabindex="0" [key2click]>
    <div [class]="model.cssClasses.switchThumb">
      <div [class]="model.cssClasses.switchThumbCircle + ' ' + model.cssClasses.switchThumbLeft"></div>
    </div>
    <div [class]="model.cssClasses.switchThumb">
      <div [class]="model.cssClasses.switchThumbCircle + ' ' + model.cssClasses.switchThumbRight"></div>
    </div>
  </div>
  <div [class]="model.cssClasses.switchCaption">
    <div [class]="model.cssClasses.switchTitle" [id]="model.labelRenderedAriaID">
      <span [model]="model.locTitle" sv-ng-string></span>
    </div>
  </div>
</div>
