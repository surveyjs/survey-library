<div class="sd-selectbase">
	<div class="sv-dropdown_select-wrapper">
		<div class="sd-dropdown sd-dropdown--select sd-formbox">
			<select aria-invalid="false" aria-label="Question title" aria-required="false" class="sd-dropdown__input sd-formbox__input">
				<option value="">Select...</option>
				<option value="item1">item1</option>
				<option value="item2">item2</option>
				<option value="item3">item3</option>
				<option value="other">Other (describe)</option>
			</select>
			<div class="sd-formbox__group">
				<div class="sd-editor-chevron-button sv-action">
					<div class="sv-action__content">
						<button class="sd-formbox__button sd-formbox-button sd-formbox-button--icon" role="button" tabindex="-1" type="button">
							<svg class="sd-formbox-button__icon sv-svg-icon" role="presentation">
								<use xlink:href="#icon-chevrondown-24x24" class="">
								</use>
							</svg>
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>
	<div class="form-group sd-question__comment-area">
		<div class="sd-comment sd-formbox">
			<textarea aria-label="Question title" aria-required="false" class="sd-comment__input sd-formbox__input" placeholder="" style="resize:none;">
			</textarea>
			<div class="sd-comment__grip">
				<svg class="sv-svg-icon" role="presentation">
					<use xlink:href="#icon-grip" class="">
					</use>
				</svg>
			</div>
		</div>
	</div>
</div>
